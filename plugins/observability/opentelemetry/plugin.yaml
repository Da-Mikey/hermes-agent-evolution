name: opentelemetry
version: "1.0.0"
description: "Optional OpenTelemetry trace/metric export for Hermes. Opt in with `hermes plugins enable observability/opentelemetry`; configure via config.yaml or HERMES_OTEL_* env vars."
author: Hermes Evolution
hooks:
  - on_session_start
  - on_session_end
  - on_session_finalize
  - on_session_reset
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - api_request_error
  - pre_tool_call
  - post_tool_call
  - pre_approval_request
  - post_approval_response
  - subagent_start
  - subagent_stop
